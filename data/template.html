<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>VIP 분석 리포트</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 40px;
        }

        h1 {
            color: #333;
        }

        .report-table {
            margin-top: 20px;
        }

        /* Pandas에서 생성된 테이블 스타일 조정 */
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th {
            background-color: #f2f2f2;
            padding: 12px;
            border: 1px solid #ddd;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>

<body>
    <h1>📊 VIP 고객 예측 결과 리포트</h1>
    <p>생성 시각: {{ date }}</p>

    <div class="report-table">
        {{ data | safe }}
    </div>
</body>

</html>
